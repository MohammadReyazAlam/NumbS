<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe - Neon Edition</title>
  <!-- Import a premium font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at top, #0f172a, #020617);
      --glass-bg: rgba(255, 255, 255, 0.02);
      --glass-border: rgba(255, 255, 255, 0.07);
      --text-primary: #f8fafc;
      --text-secondary: #64748b;
      --x-color: #3b82f6; /* Cyan-blue glow */
      --x-glow: rgba(59, 130, 246, 0.6);
      --o-color: #f43f5e; /* Rose-red glow */
      --o-glow: rgba(244, 63, 94, 0.6);
      --accent-color: #10b981; /* Winning green strike */
      --transition-speed: 0.3s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      padding: 20px;
    }

    .app-container {
      max-width: 400px;
      width: 100%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .game-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .game-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #f8fafc 30%, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Game settings drop-downs */
    .settings-panel {
      display: flex;
      width: 100%;
      gap: 12px;
      margin-bottom: 20px;
    }

    .control-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
    }

    .dropdown {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 10px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      transition: border-color var(--transition-speed);
      touch-action: manipulation;
    }

    .dropdown:focus {
      border-color: var(--x-color);
    }

    /* Stats */
    .stats-container {
      display: flex;
      width: 100%;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-box {
      flex: 1;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .stat-value {
      display: block;
      font-size: 1.3rem;
      font-weight: 600;
      margin-top: 2px;
    }

    /* Turn Indicator Banner */
    .turn-indicator {
      font-size: 1rem;
      margin-bottom: 16px;
      font-weight: 600;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.03);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
    }

    #current-turn-symbol {
      color: var(--x-color);
      text-shadow: 0 0 10px var(--x-glow);
    }

    #current-turn-symbol.symbol-o {
      color: var(--o-color);
      text-shadow: 0 0 10px var(--o-glow);
    }

    /* Game Board */
    .board-wrapper {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 12px;
      width: 100%;
      aspect-ratio: 1 / 1;
      margin-bottom: 20px;
      box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      height: 100%;
    }

    .cell {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: background-color var(--transition-speed), border-color var(--transition-speed);
      touch-action: manipulation;
    }

    @media (hover: hover) {
      .cell:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.15);
      }
      .btn-primary:hover {
        background: #2563eb;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px var(--x-glow);
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
      }
    }

    /* Rendered markers inside cells */
    .cell svg {
      width: 60%;
      height: 60%;
      stroke-width: 8;
      stroke-linecap: round;
      fill: none;
    }

    .marker-x {
      stroke: var(--x-color);
      filter: drop-shadow(0 0 8px var(--x-glow));
    }

    .marker-o {
      stroke: var(--o-color);
      filter: drop-shadow(0 0 8px var(--o-glow));
    }

    /* Drawing animations for SVG shapes */
    .draw-path {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 0.35s ease-out forwards;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* Strike-through winning line overlay */
    .strike-line {
      position: absolute;
      background: var(--accent-color);
      box-shadow: 0 0 15px var(--accent-color);
      border-radius: 4px;
      z-index: 10;
      transform-origin: left center;
      transform: scaleX(0);
      transition: transform 0.4s ease-out;
      pointer-events: none;
    }

    /* Grid layout line paths */
    .strike-row-0 { top: calc(16.66% + 12px); left: 12px; width: calc(100% - 24px); height: 6px; }
    .strike-row-1 { top: calc(50% + 0px); left: 12px; width: calc(100% - 24px); height: 6px; }
    .strike-row-2 { top: calc(83.33% - 12px); left: 12px; width: calc(100% - 24px); height: 6px; }

    .strike-col-0 { left: calc(16.66% + 12px); top: 12px; height: calc(100% - 24px); width: 6px; transform-origin: center top; }
    .strike-col-1 { left: calc(50% + 0px); top: 12px; height: calc(100% - 24px); width: 6px; transform-origin: center top; }
    .strike-col-2 { left: calc(83.33% - 12px); top: 12px; height: calc(100% - 24px); width: 6px; transform-origin: center top; }

    .strike-diag-0 { top: 12px; left: 12px; width: calc(141.4% - 34px); height: 6px; transform: rotate(45deg); }
    .strike-diag-1 { bottom: 12px; left: 12px; width: calc(141.4% - 34px); height: 6px; transform: rotate(-45deg); transform-origin: left bottom; }

    /* Control panel buttons */
    .controls {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: transform 0.1s ease, background-color var(--transition-speed), box-shadow var(--transition-speed);
      touch-action: manipulation;
    }

    .btn-primary {
      background: var(--x-color);
      color: var(--text-primary);
      box-shadow: 0 4px 14px var(--x-glow);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--glass-border);
    }

    .btn:active {
      transform: scale(0.98) translateY(0);
    }

    /* Modals */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(2, 6, 17, 0.85);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.3s ease;
    }

    .modal.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .modal-content {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--glass-border);
      max-width: 320px;
      width: 85%;
      padding: 24px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .modal-content h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .modal-content p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    /* Responsiveness adjustments */
    @media (max-width: 400px) {
      body {
        padding: 10px;
      }
      
      .app-container {
        padding: 16px;
      }

      .game-header h1 {
        font-size: 1.8rem;
      }

      .board-wrapper {
        padding: 8px;
      }

      .board {
        gap: 8px;
      }

      .btn {
        padding: 10px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header class="game-header">
      <h1>Tic-Tac-Toe</h1>
      <p class="subtitle">Neon Arena</p>
    </header>

    <!-- Game Settings / Mode Selectors -->
    <div class="settings-panel">
      <div class="control-group">
        <label for="mode-select">Game Mode</label>
        <select id="mode-select" class="dropdown">
          <option value="pvc">VS Computer</option>
          <option value="pvp">Local 2 Players</option>
        </select>
      </div>

      <div id="difficulty-group" class="control-group">
        <label for="diff-select">Difficulty</label>
        <select id="diff-select" class="dropdown">
          <option value="hard">Unbeatable</option>
          <option value="easy">Easy</option>
        </select>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-container">
      <div class="stat-box">
        <span id="p1-label" class="stat-label">Player (X)</span>
        <span id="p1-score" class="stat-value">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Draws</span>
        <span id="draw-score" class="stat-value">0</span>
      </div>
      <div class="stat-box">
        <span id="p2-label" class="stat-label">Computer (O)</span>
        <span id="p2-score" class="stat-value">0</span>
      </div>
    </div>

    <!-- Active Turn Notification -->
    <div class="turn-indicator" id="turn-indicator">
      Player <span id="current-turn-symbol">X</span>'s Turn
    </div>

    <!-- The 3x3 Grid Board -->
    <div class="board-wrapper">
      <div id="game-board" class="board">
        <!-- 9 cells -->
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
        
        <!-- Win Strike line overlay -->
        <div id="winning-line" class="strike-line"></div>
      </div>
    </div>

    <!-- General controls -->
    <div class="controls">
      <button id="reset-btn" class="btn btn-primary">Reset Board</button>
      <button id="clear-scores-btn" class="btn btn-secondary">Clear Scores</button>
    </div>
  </div>

  <!-- Win/Draw Announcement Modal -->
  <div id="result-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="result-title">🎉 X Wins!</h2>
      <p id="result-subtitle">Excellent strategy</p>
      <button id="modal-next-round" class="btn btn-primary">Next Round</button>
    </div>
  </div>

  <script>
    // Game State constants
    let boardState = Array(9).fill(null);
    let p1Score = 0;
    let p2Score = 0;
    let drawScore = 0;

    let gameMode = "pvc";      // 'pvc' (Vs Computer) or 'pvp' (Player Vs Player)
    let difficulty = "hard";   // 'easy' or 'hard' (Unbeatable)
    let currentTurn = "X";     // X always starts
    let isGameActive = true;

    // Winning configurations
    const WINNING_COMBOS = [
      { combo: [0, 1, 2], strikeClass: "strike-row-0" },
      { combo: [3, 4, 5], strikeClass: "strike-row-1" },
      { combo: [6, 7, 8], strikeClass: "strike-row-2" },
      
      { combo: [0, 3, 6], strikeClass: "strike-col-0" },
      { combo: [1, 4, 7], strikeClass: "strike-col-1" },
      { combo: [2, 5, 8], strikeClass: "strike-col-2" },
      
      { combo: [0, 4, 8], strikeClass: "strike-diag-0" },
      { combo: [2, 4, 6], strikeClass: "strike-diag-1" }
    ];

    // DOM Elements
    const cellEls = document.querySelectorAll(".cell");
    const modeSelect = document.getElementById("mode-select");
    const diffSelect = document.getElementById("diff-select");
    const diffGroup = document.getElementById("difficulty-group");

    const p1Label = document.getElementById("p1-label");
    const p2Label = document.getElementById("p2-label");
    const p1ScoreEl = document.getElementById("p1-score");
    const p2ScoreEl = document.getElementById("p2-score");
    const drawScoreEl = document.getElementById("draw-score");

    const turnIndicator = document.getElementById("turn-indicator");
    const currentTurnSymbol = document.getElementById("current-turn-symbol");
    const winningLine = document.getElementById("winning-line");

    const resetBtn = document.getElementById("reset-btn");
    const clearScoresBtn = document.getElementById("clear-scores-btn");

    const resultModal = document.getElementById("result-modal");
    const resultTitle = document.getElementById("result-title");
    const resultSubtitle = document.getElementById("result-subtitle");
    const modalNextRoundBtn = document.getElementById("modal-next-round");

    // SVG definitions to draw dynamically
    const SVG_X = `
      <svg class="marker-x" viewBox="0 0 100 100">
        <path class="draw-path" d="M 20,20 L 80,80" />
        <path class="draw-path" d="M 80,20 L 20,80" style="animation-delay: 0.15s;" />
      </svg>`;

    const SVG_O = `
      <svg class="marker-o" viewBox="0 0 100 100">
        <circle class="draw-path" cx="50" cy="50" r="30" />
      </svg>`;

    // Initialize Game Events
    document.addEventListener("DOMContentLoaded", () => {
      setupEventListeners();
      resetBoard();
    });

    function setupEventListeners() {
      cellEls.forEach(cell => {
        cell.addEventListener("click", () => handleCellClick(cell));
      });

      modeSelect.addEventListener("change", (e) => {
        gameMode = e.target.value;
        if (gameMode === "pvp") {
          diffGroup.style.display = "none";
          p1Label.textContent = "Player (X)";
          p2Label.textContent = "Player (O)";
        } else {
          diffGroup.style.display = "flex";
          p1Label.textContent = "Player (X)";
          p2Label.textContent = "Computer (O)";
        }
        resetBoard();
      });

      diffSelect.addEventListener("change", (e) => {
        difficulty = e.target.value;
        resetBoard();
      });

      resetBtn.addEventListener("click", resetBoard);
      clearScoresBtn.addEventListener("click", clearScores);
      
      modalNextRoundBtn.addEventListener("click", () => {
        resultModal.classList.add("hidden");
        resetBoard();
      });
    }

    // Main logic
    function handleCellClick(cell) {
      const index = parseInt(cell.getAttribute("data-index"));
      
      // If cell is already taken or game is inactive, ignore
      if (boardState[index] !== null || !isGameActive) return;
      
      // Prevent player from playing during computer turn evaluation
      if (gameMode === "pvc" && currentTurn === "O") return;

      makeMove(index, currentTurn);
      
      if (checkGameStatus(currentTurn)) return; // Win or Draw reached
      
      // Shift Turn
      toggleTurn();

      // If VS Computer is active, schedule Computer's move
      if (gameMode === "pvc" && isGameActive && currentTurn === "O") {
        setTimeout(makeComputerMove, 400); // Small realistic delay
      }
    }

    function makeMove(index, symbol) {
      boardState[index] = symbol;
      const cell = document.querySelector(`.cell[data-index="${index}"]`);
      cell.innerHTML = symbol === "X" ? SVG_X : SVG_O;
      
      // Vibrate slightly if mobile compatible
      if ('vibrate' in navigator) {
        try {
          navigator.vibrate(10);
        } catch (e) {
          // Fail silently
        }
      }
    }

    function toggleTurn() {
      currentTurn = currentTurn === "X" ? "O" : "X";
      currentTurnSymbol.textContent = currentTurn;
      
      if (currentTurn === "O") {
        currentTurnSymbol.classList.add("symbol-o");
      } else {
        currentTurnSymbol.classList.remove("symbol-o");
      }
    }

    function checkGameStatus(player) {
      const winInfo = checkWinner(boardState, player);
      
      if (winInfo) {
        handleWin(player, winInfo.strikeClass);
        return true;
      }
      
      // Check Draw
      if (boardState.every(cell => cell !== null)) {
        handleDraw();
        return true;
      }
      
      return false;
    }

    // Winning and Draw Screen Handler
    function handleWin(winner, strikeClass) {
      isGameActive = false;
      
      // Draw strike line
      winningLine.className = `strike-line ${strikeClass}`;
      winningLine.style.transform = getWinningLineScale(strikeClass);

      setTimeout(() => {
        if (winner === "X") {
          p1Score++;
          p1ScoreEl.textContent = p1Score;
          resultTitle.textContent = "🎉 X Wins!";
          resultSubtitle.textContent = gameMode === "pvc" ? "You defeated the machine!" : "Player X is victorious!";
        } else {
          p2Score++;
          p2ScoreEl.textContent = p2Score;
          resultTitle.textContent = "🎉 O Wins!";
          resultSubtitle.textContent = gameMode === "pvc" ? "The machine wins this round." : "Player O is victorious!";
        }
        
        resultModal.classList.remove("hidden");
      }, 700);
    }

    function handleDraw() {
      isGameActive = false;
      drawScore++;
      drawScoreEl.textContent = drawScore;
      
      setTimeout(() => {
        resultTitle.textContent = "🤝 It's a Draw!";
        resultSubtitle.textContent = "Two perfect minds meet.";
        resultModal.classList.remove("hidden");
      }, 500);
    }

    // Find winning combination configurations
    function checkWinner(board, player) {
      for (let item of WINNING_COMBOS) {
        const [a, b, c] = item.combo;
        if (board[a] === player && board[b] === player && board[c] === player) {
          return item;
        }
      }
      return null;
    }

    // Retrieve CSS transform scale parameter maps for line drawing
    function getWinningLineScale(strikeClass) {
      if (strikeClass.includes("row") || strikeClass.includes("diag")) {
        return "scaleX(1)";
      }
      if (strikeClass.includes("col")) {
        return "scaleY(1)";
      }
      return "scaleX(1)";
    }

    // Reset Game State
    function resetBoard() {
      boardState.fill(null);
      isGameActive = true;
      currentTurn = "X";
      currentTurnSymbol.textContent = "X";
      currentTurnSymbol.classList.remove("symbol-o");
      
      // Hide win line
      winningLine.className = "strike-line";
      winningLine.style.transform = "";

      // Reset grid items
      cellEls.forEach(cell => {
        cell.innerHTML = "";
      });
    }

    function clearScores() {
      p1Score = 0;
      p2Score = 0;
      drawScore = 0;
      p1ScoreEl.textContent = "0";
      p2ScoreEl.textContent = "0";
      drawScoreEl.textContent = "0";
      resetBoard();
    }

    // Computer Turn Calculations
    function makeComputerMove() {
      if (!isGameActive) return;
      
      let targetIndex;
      
      if (difficulty === "easy") {
        // Generate randomized moves
        const emptyIndices = boardState.map((val, idx) => val === null ? idx : null).filter(val => val !== null);
        targetIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
      } else {
        // Unbeatable Minimax Move Calculation
        targetIndex = getBestMove();
      }
      
      makeMove(targetIndex, "O");
      
      if (checkGameStatus("O")) return;
      
      toggleTurn();
    }

    function getBestMove() {
      let bestScore = -Infinity;
      let move = -1;
      
      for (let i = 0; i < 9; i++) {
        if (boardState[i] === null) {
          boardState[i] = "O"; // Simulate move
          let score = minimax(boardState, 0, false);
          boardState[i] = null; // Backtrack
          
          if (score > bestScore) {
            bestScore = score;
            move = i;
          }
        }
      }
      return move;
    }

    // Recursive Minimax Evaluator
    function minimax(board, depth, isMaximizing) {
      // Terminal check conditions
      if (checkWinner(board, "O")) return 10 - depth;
      if (checkWinner(board, "X")) return depth - 10;
      if (board.every(cell => cell !== null)) return 0;
      
      if (isMaximizing) {
        let bestScore = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (board[i] === null) {
            board[i] = "O";
            let score = minimax(board, depth + 1, false);
            board[i] = null;
            bestScore = Math.max(score, bestScore);
          }
        }
        return bestScore;
      } else {
        let bestScore = Infinity;
        for (let i = 0; i < 9; i++) {
          if (board[i] === null) {
            board[i] = "X";
            let score = minimax(board, depth + 1, true);
            board[i] = null;
            bestScore = Math.min(score, bestScore);
          }
        }
        return bestScore;
      }
    }
  </script>
</body>
</html>
